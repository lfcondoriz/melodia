services:
  db:
    image: postgres:16-alpine
    container_name: melodia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: melodia
      POSTGRES_PASSWORD: melodia
      POSTGRES_DB: melodia
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: